<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 26-03-2026</title>
</head>
<body>
    <h1>Calculadora de Abastecimento </h1>
    <hr>
    <p>Escolha o tipo de combustivel e a qntd de livros</p>
    <h2>Tabela de Preco</h2>
    <ul>
        <li>Gasolina: 7,00</li>
        <li>Diesel: 4,30</li>
        <li>Etanol: 6,04</li>
    </ul>

<form id="FormularoAbastecimento">
    <label for="combustivel">Tipo combustivel</label>
    <select name="combustivel" id="combustivel">
        <option value="">Escolha uma Opção</option>
        <option value="gasolina">Gasolina</option>
        <option value="diesel">Diesel</option>
        <option value="etanol">Etanol</option>
    </select>
    <label for="litros">Qntd (Litros)</label>
    <input type="number" min="0" step="0.1" id="litros">
</form>
<h2>Resultado:</h2>
<p id="resultado"></p>
<script src="script.js"></script>
</body>
</html>
